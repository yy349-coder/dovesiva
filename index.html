<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dove Andiamo?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7F3EE;
            --bg-card: #FFFFFF;
            --text: #1A1A1A;
            --text-muted: #7A7060;
            --accent: #C4622D;
            --accent-light: #F2E8DF;
            --border: #E5DDD5;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── SETUP SCREEN ── */
        #screen-setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 24px;
        }

        .setup-box {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: var(--shadow);
        }

        .setup-title {
            font-family: 'Lora', serif;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .setup-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .setup-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            display: block;
        }

        .setup-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            background: var(--bg);
            outline: none;
            transition: border-color 0.2s;
        }

        .setup-input:focus { border-color: var(--accent); }

        .setup-btn {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .setup-btn:hover { opacity: 0.9; }

        .setup-hint {
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
        }

        .setup-hint a { color: var(--accent); }

        /* ── MAIN SCREEN ── */
        #screen-main {
            display: none;
            flex-direction: column;
            min-height: 100dvh;
        }

        .header {
            padding: 20px 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-family: 'Lora', serif;
            font-size: 1.5rem;
            font-weight: 600;
            font-style: italic;
        }

        .header-settings {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            display: flex;
        }

        .search-area { padding: 20px; }

        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
            border-radius: 16px;
            padding: 6px 6px 6px 18px;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .search-box:focus-within { border-color: var(--accent); }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            background: transparent;
            color: var(--text);
            min-width: 0;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .search-btn:hover { opacity: 0.9; }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .suggestions {
            padding: 0 20px 8px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .suggestions::-webkit-scrollbar { display: none; }

        .chip {
            white-space: nowrap;
            padding: 8px 14px;
            border-radius: 20px;
            background: var(--accent-light);
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
            transition: background 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .chip:hover { background: #E8D5C8; }

        .results-area {
            padding: 12px 20px 80px;
            flex: 1;
        }

        .results-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 600px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 900px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 22px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .tag {
            font-size: 0.75rem;
            color: var(--accent);
            background: var(--accent-light);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .card-title {
            font-family: 'Lora', serif;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .card-location {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-summary {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-duration {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card-cta {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 500;
        }

        /* ── LOADING ── */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: var(--text-muted); font-size: 0.95rem; }

        /* ── EMPTY / ERROR ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 3rem; margin-bottom: 16px; }

        /* ── DETAIL DRAWER ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .overlay.active { display: block; }

        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-radius: 24px 24px 0 0;
            max-height: 90dvh;
            overflow-y: auto;
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .drawer.active { transform: translateY(0); }

        @media (min-width: 700px) {
            .drawer {
                left: 50%;
                right: auto;
                transform: translateX(-50%) translateY(100%);
                width: 600px;
                border-radius: 24px 24px 0 0;
            }
            .drawer.active { transform: translateX(-50%) translateY(0); }
        }

        .drawer-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 16px auto 0;
        }

        .drawer-content { padding: 24px 24px 8px; }

        .drawer-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .drawer-title {
            font-family: 'Lora', serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .drawer-location {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .drawer-duration {
            display: inline-block;
            font-size: 0.8rem;
            color: var(--accent);
            background: var(--accent-light);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .drawer-details {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text);
            white-space: pre-line;
        }

        .drawer-sources {
            margin: 28px 24px 0;
            padding: 20px 0 8px;
            border-top: 1px solid var(--border);
        }

        .sources-title {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .source-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
        }

        .source-item:last-child { border-bottom: none; }

        .source-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: var(--accent-light);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .source-name {
            font-size: 0.85rem;
            color: var(--accent);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .drawer-close {
            position: sticky;
            bottom: 0;
            width: 100%;
            padding: 16px 24px;
            background: var(--bg);
            border: none;
            border-top: 1px solid var(--border);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="screen-setup">
    <div class="setup-box">
        <div class="setup-title">Dove Andiamo? 🌍</div>
        <div class="setup-subtitle">Inserisci la tua Gemini API key per iniziare. La salviamo solo nel tuo browser, non finirà mai su GitHub.</div>
        <label class="setup-label">Gemini API Key</label>
        <input type="password" class="setup-input" id="api-key-input"
               placeholder="AIzaSy..."
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="setup-btn" onclick="saveApiKey()">Inizia →</button>
        <div class="setup-hint">
            Non hai una key? <a href="https://aistudio.google.com/app/apikey" target="_blank">Creala gratis su Google AI Studio</a>
        </div>
    </div>
</div>

<!-- ── MAIN SCREEN ── -->
<div id="screen-main">
    <div class="header">
        <div class="header-title">Dove Andiamo?</div>
        <button class="header-settings" onclick="showSetup()" title="Impostazioni">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>

    <div class="search-area">
        <div class="search-box">
            <input type="text" class="search-input" id="search-input"
                   placeholder="Es: weekend rilassante in montagna..."
                   autocomplete="off">
            <button class="search-btn" id="search-btn" onclick="doSearch()">Cerca</button>
        </div>
    </div>

    <div class="suggestions">
        <button class="chip" onclick="quickSearch('weekend al mare in Italia')">🌊 Mare</button>
        <button class="chip" onclick="quickSearch('weekend in montagna')">🏔️ Montagna</button>
        <button class="chip" onclick="quickSearch('vacanza culturale in Europa')">🏛️ Cultura</button>
        <button class="chip" onclick="quickSearch('weekend romantico in Italia')">❤️ Romantico</button>
        <button class="chip" onclick="quickSearch('avventura e natura weekend')">🌿 Natura</button>
        <button class="chip" onclick="quickSearch('vacanza low cost Europa')">💸 Low cost</button>
        <button class="chip" onclick="quickSearch('città d\'arte da visitare in Italia')">🎨 Arte</button>
        <button class="chip" onclick="quickSearch('borghi italiani da visitare weekend')">🏘️ Borghi</button>
    </div>

    <div class="results-area" id="results-area">
        <div class="empty-state">
            <div class="empty-icon">🗺️</div>
            <div>Cerca un'idea per le tue prossime vacanze o il prossimo weekend</div>
        </div>
    </div>
</div>

<!-- ── OVERLAY + DRAWER ── -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-content" id="drawer-content"></div>
    <div class="drawer-sources" id="drawer-sources"></div>
    <button class="drawer-close" onclick="closeDrawer()">✕ Chiudi</button>
</div>

<script>
    const STORAGE_KEY = 'dove_andiamo_api_key';
    let currentSources = [];
    let currentIdeas = [];

    // ── Init
    window.addEventListener('DOMContentLoaded', () => {
        const key = localStorage.getItem(STORAGE_KEY);
        if (key) showMain();

        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });
        document.getElementById('api-key-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') saveApiKey();
        });
    });

    // ── API key management
    function saveApiKey() {
        const key = document.getElementById('api-key-input').value.trim();
        if (!key) { alert('Inserisci una API key valida'); return; }
        localStorage.setItem(STORAGE_KEY, key);
        showMain();
    }

    function showMain() {
        document.getElementById('screen-setup').style.display = 'none';
        document.getElementById('screen-main').style.display = 'flex';
    }

    function showSetup() {
        document.getElementById('screen-main').style.display = 'none';
        document.getElementById('screen-setup').style.display = 'flex';
        document.getElementById('api-key-input').value = localStorage.getItem(STORAGE_KEY) || '';
    }

    // ── Search
    function quickSearch(query) {
        document.getElementById('search-input').value = query;
        doSearch();
    }

    async function doSearch() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;

        const apiKey = localStorage.getItem(STORAGE_KEY);
        if (!apiKey) { showSetup(); return; }

        const btn = document.getElementById('search-btn');
        btn.disabled = true;
        btn.textContent = '...';
        showLoading();

        try {
            const result = await callGemini(apiKey, query);
            renderResults(result.ideas, result.sources);
        } catch (err) {
            showError(err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Cerca';
        }
    }

    // ── Gemini API — due chiamate: 1) search+grounding  2) struttura JSON
    async function callGemini(apiKey, query) {

        // ── CHIAMATA 1: ricerca con grounding → testo libero + fonti
        const searchPrompt = `Sei un esperto di viaggi in Italia e in Europa.
L'utente sta cercando: "${query}"
Descrivi in dettaglio 6 idee di viaggio specifiche e diverse per questa richiesta.
Per ognuna includi: nome del posto, luogo preciso, durata consigliata, cosa fare, dove mangiare, come arrivare, periodo migliore e consigli pratici. Non citare Booking, Airbnb o piattaforme di prenotazione.`;

        const r1 = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent:generateContent?key=${apiKey}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: searchPrompt }] }],
                    tools: [{ google_search: {} }]
                })
            }
        );

        if (!r1.ok) {
            const err = await r1.json().catch(() => ({}));
            throw new Error(err?.error?.message || `Errore API (${r1.status})`);
        }

        const d1 = await r1.json();

        // Estrai fonti dal grounding
        const sources = [];
        const grounding = d1?.candidates?.[0]?.groundingMetadata;
        if (grounding?.groundingChunks) {
            grounding.groundingChunks.forEach(chunk => {
                if (chunk.web?.uri) {
                    sources.push({ uri: chunk.web.uri, title: chunk.web.title || chunk.web.uri });
                }
            });
        }

        // Estrai il testo
        const rawText = (d1?.candidates?.[0]?.content?.parts || [])
            .map(p => p.text || '').join('');

        if (!rawText) throw new Error('Nessuna risposta da Gemini. Controlla la API key.');

        // ── CHIAMATA 2: struttura il testo in JSON garantito
        const structPrompt = `Trasforma il seguente testo in un JSON strutturato.
Restituisci SOLO il JSON, senza markdown, senza testo aggiuntivo.

Struttura richiesta:
{"ideas":[{"title":"...","location":"...","duration":"...","summary":"frase breve di 2-3 righe","details":"testo completo dettagliato","tags":["tag1","tag2","tag3"]}]}

Testo da strutturare:
${rawText}`;

        const r2 = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${apiKey}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: structPrompt }] }],
                    generationConfig: { responseMimeType: 'application/json' }
                })
            }
        );

        if (!r2.ok) {
            const err = await r2.json().catch(() => ({}));
            throw new Error(err?.error?.message || `Errore struttura (${r2.status})`);
        }

        const d2 = await r2.json();
        const jsonText = (d2?.candidates?.[0]?.content?.parts || [])
            .map(p => p.text || '').join('');

        let parsed;
        try {
            parsed = JSON.parse(jsonText);
        } catch {
            throw new Error('Errore nel parsing del JSON. Riprova.');
        }

        return { ideas: parsed.ideas || [], sources };
    }

    // ── UI helpers
    function showLoading() {
        document.getElementById('results-area').innerHTML = `
            <div class="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Sto cercando idee per te...</div>
            </div>`;
    }

    function showError(msg) {
        document.getElementById('results-area').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">⚠️</div>
                <div style="margin-bottom:8px;font-weight:500;color:var(--text)">Qualcosa è andato storto</div>
                <div style="font-size:0.85rem">${esc(msg)}</div>
            </div>`;
    }

    function renderResults(ideas, sources) {
        currentSources = sources;
        currentIdeas = ideas;

        if (!ideas || ideas.length === 0) {
            document.getElementById('results-area').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🤔</div>
                    <div>Nessuna idea trovata. Prova con una ricerca diversa.</div>
                </div>`;
            return;
        }

        const html = ideas.map((idea, i) => `
            <div class="card" onclick="openDrawer(${i})">
                <div class="card-tags">
                    ${(idea.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
                </div>
                <div class="card-title">${esc(idea.title)}</div>
                <div class="card-location">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    ${esc(idea.location)}
                </div>
                <div class="card-summary">${esc(idea.summary)}</div>
                <div class="card-footer">
                    <span class="card-duration">⏱ ${esc(idea.duration)}</span>
                    <span class="card-cta">Scopri →</span>
                </div>
            </div>
        `).join('');

        document.getElementById('results-area').innerHTML = `
            <div class="results-meta">${ideas.length} idee trovate</div>
            <div class="cards-grid">${html}</div>`;
    }

    // ── Drawer
    function openDrawer(index) {
        const idea = currentIdeas[index];
        if (!idea) return;

        document.getElementById('drawer-content').innerHTML = `
            <div class="drawer-tags">
                ${(idea.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
            </div>
            <div class="drawer-title">${esc(idea.title)}</div>
            <div class="drawer-location">📍 ${esc(idea.location)}</div>
            <div class="drawer-duration">⏱ ${esc(idea.duration)}</div>
            <div class="drawer-details">${esc(idea.details)}</div>`;

        const sourcesEl = document.getElementById('drawer-sources');
        if (currentSources.length > 0) {
            sourcesEl.innerHTML = `
                <div class="sources-title">🔍 Fonti utilizzate</div>
                ${currentSources.slice(0, 6).map(s => `
                    <a href="${esc(s.uri)}" target="_blank" rel="noopener noreferrer" class="source-item">
                        <div class="source-icon">🔗</div>
                        <span class="source-name">${esc(s.title)}</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="7" y1="17" x2="17" y2="7"></line>
                            <polyline points="7 7 17 7 17 17"></polyline>
                        </svg>
                    </a>`).join('')}`;
            sourcesEl.style.display = 'block';
        } else {
            sourcesEl.innerHTML = '';
            sourcesEl.style.display = 'none';
        }

        document.getElementById('overlay').classList.add('active');
        document.getElementById('drawer').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('drawer').classList.remove('active');
        document.body.style.overflow = '';
    }

    // ── Escape HTML
    function esc(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
</script>
</body>
</html>
